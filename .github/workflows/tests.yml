name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # pytest config (incl. the 80% coverage gate) lives in pyproject.toml.
      # config/settings_test.py injects the required env vars, so no secrets needed.
      - name: Run tests
        run: pytest
