name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Pin to the same ruff version as requirements-dev.txt so CI and local agree.
      - name: Install ruff
        run: pip install ruff==0.11.13

      - name: Ruff check
        run: ruff check .
